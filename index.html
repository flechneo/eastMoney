<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta content="default-src 'none'; style-src * 'unsafe-inline'; script-src * 'unsafe-inline'; img-src * data: blob:; font-src * data:; media-src * data: blob:; connect-src https:; form-action 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'" http-equiv="Content-Security-Policy"/>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>基金多选添加系统 </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <style>
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fund-item { transition: all 0.3s ease; }
        .fund-item:hover { transform: translateY(-2px); }
        
        @media (max-width: 640px) {
            #fund-search { font-size: 1rem !important; }
            body { padding-bottom: 1rem; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-gray-800 bg-gray-100">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="mx-auto px-4 py-4 w-full">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-600 text-white p-2 rounded-lg">
                        <i class="fa-solid fa-layer-group text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-gray-900">多基金自选管理</h1>
                    </div>
                </div>
                <span class="text-xs text-gray-400" id="system-time">加载中...</span>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full px-4 py-4 space-y-6">
        <section class="bg-white rounded-2xl p-4 card-shadow overflow-hidden">
            <h2 class="text-base font-semibold text-gray-900 mb-4 flex items-center">
                <i class="fa-solid fa-magnifying-glass mr-2 text-blue-600"></i> 添加新基金
            </h2>
            <div class="flex flex-col gap-3 mb-4">
                <div class="relative w-full">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-barcode text-gray-400"></i>
                    </div>
                    <input class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-xl bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" id="fund-search" maxlength="6" placeholder="输入6位基金代码 (例如: 016874)" type="text" inputmode="numeric"/>
                </div>
                <button class="w-full inline-flex items-center justify-center px-4 py-3 border border-transparent text-sm font-medium rounded-xl text-white bg-blue-600 hover:bg-blue-700" id="search-btn">
                    <i class="fa-solid fa-search mr-2"></i> 搜索基金
                </button>
            </div>

            <div class="hidden mt-3 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm" id="error-message">
                <i class="fa-solid fa-circle-exclamation mr-2"></i>
                <span id="error-text">错误信息</span>
            </div>

            <div class="hidden border-2 border-dashed border-gray-200 rounded-xl p-4 bg-gray-50" id="preview-card">
                <div class="flex flex-col sm:flex-row justify-between items-start gap-2">
                    <div>
                        <h3 class="text-lg font-bold text-gray-900" id="preview-name">基金名称</h3>
                        <p class="text-sm text-gray-500" id="preview-code">代码: 000000</p>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-bold" id="preview-est">0.0000</p>
                        <p class="text-sm" id="preview-change">▲ 0.00%</p>
                    </div>
                </div>
                <div class="mt-4 flex flex-col-reverse sm:flex-row justify-end gap-2">
                    <button class="w-full sm:w-auto px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-100" id="cancel-preview">
                        <i class="fa-solid fa-xmark mr-1"></i> 取消
                    </button>
                    <button class="w-full sm:w-auto px-4 py-2 text-sm bg-green-600 text-white rounded-lg hover:bg-green-700" id="confirm-add">
                        <i class="fa-solid fa-check mr-1"></i> 确认添加
                    </button>
                </div>
            </div>
        </section>

        <section class="space-y-4" id="fund-list-container">
            <p class="text-center text-gray-400 py-8 text-sm" id="empty-tip">暂无已添加基金，请在上方搜索添加</p>
        </section>
    </main>

    <footer class="bg-white border-t border-gray-200">
        <div class="px-4 py-4 w-full text-center">
            <p class="text-xs text-gray-400">© 2026 基金系统 - JSONP 完美适配手机端</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const updateTime = () => {
                const now = new Date();
                document.getElementById('system-time').textContent = now.toLocaleString('zh-CN', { hour12: false });
            };
            setInterval(updateTime, 1000);
            updateTime();

            let currentPreviewData = null;
            const addedFunds = new Set();

            const searchInput = document.getElementById('fund-search');
            const searchBtn = document.getElementById('search-btn');
            const errorBox = document.getElementById('error-message');
            const previewCard = document.getElementById('preview-card');
            const fundListContainer = document.getElementById('fund-list-container');
            const emptyTip = document.getElementById('empty-tip');

            // JSONP 搜索核心函数（彻底解决 failed to fetch）
            function searchFund(code) {
                // 移除旧脚本
                const oldScript = document.getElementById('fund-jsonp-script');
                if (oldScript) oldScript.remove();

                // 定义全局回调（基金接口固定调用 jsonpgz）
                window.jsonpgz = function(data) {
                    delete window.jsonpgz; // 清理

                    if (!data || !data.name) {
                        showError('未查询到该基金数据，请检查代码是否正确');
                        return;
                    }

                    currentPreviewData = { ...data, fundcode: code };
                    renderPreview(data);
                    previewCard.classList.remove('hidden');
                    errorBox.classList.add('hidden');
                };

                const script = document.createElement('script');
                script.id = 'fund-jsonp-script';
                script.src = `https://fundgz.1234567.com.cn/js/${code}.js`;
                script.onerror = () => {
                    delete window.jsonpgz;
                    showError('加载失败：网络错误或基金代码无效');
                    previewCard.classList.add('hidden');
                };
                document.head.appendChild(script);
            }

            searchBtn.addEventListener('click', () => {
                const code = searchInput.value.trim();
                if (code.length !== 6) {
                    showError('请输入6位基金代码');
                    return;
                }
                
                if (addedFunds.has(code)) {
                    showError(`代码 ${code} 已存在列表中`);
                    return;
                }

                errorBox.classList.add('hidden');
                searchFund(code);
            });

            document.getElementById('confirm-add').addEventListener('click', () => {
                if (!currentPreviewData) return;
                const code = currentPreviewData.fundcode;

                if (addedFunds.has(code)) {
                    showError(`代码 ${code} 已存在`);
                    return;
                }

                addedFunds.add(code);
                createFundCard(currentPreviewData);
                previewCard.classList.add('hidden');
                currentPreviewData = null;
                searchInput.value = '';
                if (emptyTip) emptyTip.style.display = 'none';
            });

            document.getElementById('cancel-preview').addEventListener('click', () => {
                previewCard.classList.add('hidden');
                currentPreviewData = null;
            });

            function renderPreview(data) {
                const changePercent = parseFloat(data.gszzl) || 0;
                const isUp = changePercent > 0;
                const changeColor = isUp ? 'text-red-600' : 'text-green-600';
                
                document.getElementById('preview-name').textContent = data.name;
                document.getElementById('preview-code').textContent = `代码: ${data.fundcode}`;
                document.getElementById('preview-est').textContent = data.gsz;
                
                const changeEl = document.getElementById('preview-change');
                changeEl.textContent = `${isUp ? '▲' : '▼'} ${changePercent.toFixed(2)}%`;
                changeEl.className = `text-sm font-medium ${changeColor}`;
            }

            function createFundCard(data) {
                const card = document.createElement('div');
                card.className = 'fund-item bg-white rounded-2xl overflow-hidden card-shadow border border-gray-100 mb-2 fade-in';
                card.dataset.fundCode = data.fundcode;

                const changePercent = parseFloat(data.gszzl) || 0;
                const isUp = changePercent > 0;
                const changeColor = isUp ? 'text-red-600' : 'text-green-600';

                card.innerHTML = `
                <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                    <div>
                        <h3 class="text-base font-bold text-gray-900">${data.name}</h3>
                        <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">${data.fundcode}</span>
                    </div>
                    <div class="text-right sm:ml-auto">
                        <div class="text-2xl font-bold">${data.gsz}</div>
                        <div class="flex items-center justify-end mt-1 text-sm font-medium ${changeColor}">
                            <span>${isUp ? '▲' : '▼'}</span>
                            <span class="ml-1">${changePercent.toFixed(2)}%</span>
                        </div>
                    </div>
                </div>
                <div class="p-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">
                        <div class="flex items-start p-3 rounded-lg hover:bg-gray-50 bg-white">
                            <div class="flex-shrink-0 bg-indigo-50 text-indigo-600 p-2 rounded-lg">
                                <i class="fa-solid fa-sack-dollar"></i>
                            </div>
                            <div class="ml-3">
                                <p class="text-xs font-medium text-gray-500">单位净值</p>
                                <p class="mt-1 text-sm font-semibold text-gray-900">${data.dwjz}</p>
                                <p class="text-xs text-gray-400 mt-0.5">日期: ${data.jzrq}</p>
                            </div>
                        </div>
                        <div class="flex items-start p-3 rounded-lg hover:bg-gray-50 bg-white">
                            <div class="flex-shrink-0 bg-emerald-50 text-emerald-600 p-2 rounded-lg">
                                <i class="fa-solid fa-arrow-trend-up"></i>
                            </div>
                            <div class="ml-3">
                                <p class="text-xs font-medium text-gray-500">最新估值</p>
                                <p class="mt-1 text-sm font-semibold text-gray-900">${data.gsz}</p>
                                <p class="text-xs text-gray-400 mt-0.5">估算时间: ${data.gztime}</p>
                            </div>
                        </div>
                        <div class="flex items-start p-3 rounded-lg hover:bg-gray-50 bg-white">
                            <div class="flex-shrink-0 bg-orange-50 text-orange-600 p-2 rounded-lg">
                                <i class="fa-solid fa-percent"></i>
                            </div>
                            <div class="ml-3">
                                <p class="text-xs font-medium text-gray-500">涨跌幅度</p>
                                <p class="mt-1 text-sm font-semibold ${changeColor}"> ${changePercent.toFixed(2)}% </p>
                                <p class="text-xs text-gray-400 mt-0.5">较昨日</p>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-100">
                        <button class="w-full text-xs text-red-600 border border-red-200 py-2 rounded-lg remove-btn" data-code="${data.fundcode}">
                            <i class="fa-solid fa-trash mr-1"></i> 删除此基金
                        </button>
                    </div>
                </div>
                `;

                fundListContainer.appendChild(card);

                card.querySelector('.remove-btn').addEventListener('click', function() {
                    const code = this.dataset.code;
                    card.remove();
                    addedFunds.delete(code);
                    if (fundListContainer.querySelectorAll('.fund-item').length === 0) {
                        emptyTip.style.display = 'block';
                    }
                });
            }

            function showError(msg) {
                document.getElementById('error-text').textContent = msg;
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
